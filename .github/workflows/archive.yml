name: Archive snapshot

# Monthly snapshot to the Internet Archive's Wayback Machine.
# Hedges against repo deletion / Pages outage — anyone can recover the
# catalogue and shell from web.archive.org even if this repo disappears.

on:
  schedule:
    # 03:17 UTC on the 1st of each month — odd minute avoids cron rush.
    - cron: "17 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Submit Save Page Now requests
        run: |
          set -euo pipefail
          BASE="https://sarangvehale.github.io/hibiki"
          # Only archive the shell + catalogue + sitemap. Per-album pages
          # are hash routes resolved client-side, so the shell snapshot
          # already preserves the routing.
          URLS=(
            "$BASE/"
            "$BASE/_catalogue/catalogue.json"
            "$BASE/sitemap.xml"
            "$BASE/robots.txt"
          )
          accepted=0
          for u in "${URLS[@]}"; do
            echo "saving: $u"
            code=$(curl -sL --max-time 30 -o /tmp/wb.html -w "%{http_code}" \
              "https://web.archive.org/save/$u" || echo 000)
            echo "  → HTTP $code"
            # Save Page Now returns 200 on accept (sync), 429 when rate-
            # limited (still accepted into the queue async). Anything else
            # is a real failure.
            case "$code" in 200|429) accepted=$((accepted + 1)) ;; esac
            sleep 5
          done
          echo "accepted: $accepted / ${#URLS[@]}"
          # Fail loudly if nothing made it through — the cron shouldn't
          # be reporting "success" while silently never archiving.
          if [ "$accepted" -eq 0 ]; then
            echo "::error::no Save Page Now requests were accepted"
            exit 1
          fi

      - name: Verify at least one snapshot exists post-dispatch
        run: |
          # Wayback's worker may take minutes to actually crawl; allow time.
          sleep 60
          ok=$(curl -fsSL --max-time 30 \
            "https://archive.org/wayback/available?url=https%3A//sarangvehale.github.io/hibiki/" \
            | python3 -c "import json,sys; print(int(bool(json.load(sys.stdin).get('archived_snapshots',{}).get('closest'))))")
          if [ "$ok" = "1" ]; then
            echo "✅ at least one snapshot exists"
          else
            echo "::warning::no snapshot visible yet — Wayback worker may still be processing"
          fi
