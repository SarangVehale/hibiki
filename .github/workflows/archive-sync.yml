name: IA reconciliation (audit)

# Read-only audit of Internet Archive backups. Runs monthly. Compares
# album file counts in the local catalogue against what's actually
# present on IA; fails the job (with a notice annotation) if any
# album is missing or incomplete.
#
# This used to be the upload cron — that role moved to
# .github/workflows/ia-on-push.yml (delta-on-push) and the maintainer
# pre-push hook (scripts/git-hooks/pre-push). All this job does is
# alert on drift, so it costs no LFS bandwidth.

on:
  schedule:
    # 04:23 UTC on the 7th of each month — staggered from archive.yml.
    - cron: "23 4 7 * *"
  workflow_dispatch:
    inputs:
      verbose:
        description: "Print per-album OK lines, not just drift"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write   # for opening a drift-alert issue if any

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (no LFS — audit is metadata-only)
        uses: actions/checkout@v6
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run audit
        id: audit
        run: |
          set +e
          QUIET_FLAG="--quiet"
          if [ "${{ inputs.verbose }}" = "true" ]; then
            QUIET_FLAG=""
          fi
          python scripts/audit_ia.py $QUIET_FLAG > /tmp/audit.json
          echo "exit=$?" >> "$GITHUB_OUTPUT"

      - name: Show drift (if any)
        if: always()
        run: |
          if [ -s /tmp/audit.json ]; then
            echo "===== DRIFT REPORT ====="
            cat /tmp/audit.json
          fi

      - name: Surface result
        if: always()
        run: |
          case "${{ steps.audit.outputs.exit }}" in
            0)
              echo "::notice::IA audit clean — every album present and complete."
              ;;
            1)
              echo "::error::IA drift detected — see drift report above. Investigate via scripts/sync_archive_org.py --only ARTIST."
              exit 1
              ;;
            2)
              echo "::warning::IA audit hit transient network errors. Treating as inconclusive; re-run later."
              exit 1
              ;;
            *)
              echo "::error::IA audit failed with unexpected exit code ${{ steps.audit.outputs.exit }}."
              exit 1
              ;;
          esac
