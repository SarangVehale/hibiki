name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # No lfs: true — LFS bandwidth quota is exhausted by repeated 5.6 GB pulls.
      # The catalogue is built locally and committed; CI only injects the CDN URL.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p public/_catalogue public/_zips

          if [[ -n "${{ secrets.R2_ACCOUNT_ID }}" && -n "${{ secrets.R2_PUBLIC_URL }}" ]]; then
            MEDIA_BASE="https://${{ secrets.R2_PUBLIC_URL }}"
          else
            MEDIA_BASE="https://media.githubusercontent.com/media/${{ github.repository }}/${{ github.ref_name }}"
          fi

          python3 scripts/inject_cdn.py "$MEDIA_BASE"
          python3 scripts/build_sitemap.py
          cp -f _zips/*.zip public/_zips/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
