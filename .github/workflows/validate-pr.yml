name: Validate contribution

on:
  pull_request:
    paths:
      - "music/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install mutagen PyYAML

      - name: Lint meta.yaml files
        id: lint_meta
        if: always()
        run: |
          set +e
          python scripts/lint_meta.py --format markdown > meta_lint.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat meta_lint.md

      - name: Validate submitted files
        id: check
        run: |
          python - <<'PY'
          import pathlib, sys
          try:
              import yaml
          except ImportError:
              yaml = None
          AUDIO = {".flac", ".mp3", ".m4a", ".aac"}
          MAX_FILE_MB, MAX_TOTAL_MB = 100, 500
          music = pathlib.Path("music")
          errors, warnings, hints, total = [], [], [], 0.0

          audio_files = [p for p in music.rglob("*") if p.suffix.lower() in AUDIO] if music.exists() else []
          # Group audio by album dir
          album_dirs = {p.parent for p in audio_files}

          # 1. Size limits — hard errors
          for p in audio_files:
              mb = p.stat().st_size / (1024*1024); total += mb
              if mb > MAX_FILE_MB:
                  errors.append(
                      f"`{p.name}` is {mb:.1f} MB — exceeds the {MAX_FILE_MB} MB/file limit. "
                      f"Re-encode to FLAC or MP3 320 kbps if a smaller version works."
                  )
          if total > MAX_TOTAL_MB:
              errors.append(
                  f"Total upload is {total:.0f} MB — exceeds the {MAX_TOTAL_MB} MB/PR limit. "
                  f"Split into multiple PRs (one album each is fine)."
              )

          # 2. Cover art — warning, not blocker (build embeds-art fallback)
          covers = list(music.rglob("cover.*"))
          for d in album_dirs:
              if not any((d / f"cover{ext}").exists() for ext in (".jpg",".jpeg",".png",".svg")):
                  hints.append(
                      f"`{d}` — no `cover.jpg`. Build will try to extract embedded artwork "
                      f"from the first track; if that also fails the album shows a kanji tile."
                  )

          # 3. meta.yaml — warning + tell them where it should go
          for d in album_dirs:
              meta = d / "meta.yaml"
              if not meta.exists():
                  hints.append(
                      f"`{d}/meta.yaml` is missing — without it, the album shows "
                      f"\"Unknown / null\" instead of genre + year. Template at the bottom of this comment."
                  )
              elif yaml is not None:
                  try:
                      yaml.safe_load(meta.read_text(encoding="utf-8"))
                  except yaml.YAMLError as e:
                      errors.append(
                          f"`{meta}` doesn't parse as YAML: {e}. "
                          f"Common cause: a `:` inside a value that isn't quoted."
                      )

          # 4. Track filename hint
          for p in audio_files:
              stem = p.stem
              # Expected: "NN - Title" or just a song title (compilation/Singles dir)
              if " - " in stem and not stem[:2].isdigit():
                  hints.append(
                      f"`{p.name}` — filename has `-` but no leading track number. "
                      f"Use `NN - Title.ext` if this is a numbered tracklist; ignore if it's a single."
                  )

          summary = ["## Automated checks", ""]
          summary.append(f"- {'❌' if any('exceeds' in e for e in errors) else '✅'} Size limits — {total:.0f} MB total, {len(audio_files)} file(s) across {len(album_dirs)} album dir(s)")
          summary.append(f"- {'✅' if covers else '⚠️'} Cover art — {len(covers)} `cover.*` file(s) found")
          summary.append(f"- {'✅' if not any('meta.yaml' in e for e in errors) else '❌'} `meta.yaml` parses")
          summary.append(f"- {'✅' if audio_files else '⚠️'} Audio files detected")

          if errors:
              summary += ["", "### Errors (must fix before merge)", *[f"- {e}" for e in errors]]
          if hints:
              summary += ["", "### Heads-up (build will still work, but)", *[f"- {h}" for h in hints]]

          # Inline the meta.yaml lint output if it produced anything.
          lint_md = pathlib.Path("meta_lint.md")
          if lint_md.exists():
              lint_content = lint_md.read_text(encoding="utf-8").strip()
              if lint_content and not lint_content.startswith("✅"):
                  summary += ["", lint_content]

          summary += [
              "",
              "### Need help?",
              "- New to GitHub? Press **`.`** on the repo page to open it in github.dev — edit in the browser, no install.",
              "- See [`CONTRIBUTING.md`](https://github.com/SarangVehale/hibiki/blob/main/CONTRIBUTING.md) for the full walkthrough.",
              "- `meta.yaml` template:",
              "  ```yaml",
              "  title: Album Title",
              "  year:  2024",
              "  genre: Ambient",
              "  license: CC-BY-4.0",
              "  notes: Optional one-liner about the release.",
              "  ```",
          ]

          pathlib.Path("pr_summary.md").write_text("\n".join(summary))
          print("\n".join(summary))
          # Combine: PR fails if either step found errors.
          meta_lint_failed = "${{ steps.lint_meta.outputs.exit_code }}" == "1"
          sys.exit(1 if errors or meta_lint_failed else 0)
          PY

      - name: Post summary comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          path: pr_summary.md
