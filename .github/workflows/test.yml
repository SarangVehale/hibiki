name: Tests

on:
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - "public/**"
      - ".github/workflows/**"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install pytest mutagen Pillow PyYAML
      - name: Run tests
        run: pytest tests/ -v
