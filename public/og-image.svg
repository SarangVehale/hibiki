    <text x="0" y="80" font-family="'Shippori Mincho', serif" font-weight="700" font-size="100" fill="#a14d62">音色</text>
    <text x="0" y="180" font-family="'DM Mono', monospace" font-weight="400" font-size="28" fill="#8a8270" letter-spacing="4">A FREE, PUBLIC MUSIC ARCHIVE</text>
